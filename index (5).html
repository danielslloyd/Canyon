<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canyon Flight</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        #hud div {
            margin-bottom: 8px;
        }

        #controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            max-width: 280px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #controls-panel h3 {
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 8px;
        }

        #controls-panel label {
            display: block;
            margin: 8px 0 4px;
        }

        #controls-panel input[type="range"] {
            width: 100%;
        }

        #controls-panel select, #controls-panel button {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            border-radius: 4px;
            border: none;
        }

        #controls-panel button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        #controls-panel button:hover {
            background: #45a049;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        .checkbox-container input {
            margin-right: 8px;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 12px;
            color: white;
            text-align: center;
            display: none;
        }

        #game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff4444;
        }

        #game-over p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        #game-over button {
            padding: 12px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            text-align: center;
        }

        .value-display {
            color: #88ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div>Score: <span id="score">0</span></div>
            <div>Rings: <span id="rings-collected">0</span></div>
            <div>Health: <span id="health">100</span></div>
        </div>

        <div id="controls-panel">
            <h3>Settings</h3>

            <label>Time of Day:</label>
            <select id="time-of-day">
                <option value="morning" selected>Morning (Fog)</option>
                <option value="noon">Noon</option>
                <option value="sunset">Sunset</option>
            </select>

            <label>Canyon Detail (LOD): <span id="lod-value" class="value-display">12</span></label>
            <input type="range" id="canyon-lod" min="2" max="20" value="12">

            <label>Ring Frequency: <span id="ring-freq-value" class="value-display">0</span></label>
            <input type="range" id="ring-frequency" min="0" max="10" value="0">

            <label>Ring Rotation Axis:</label>
            <select id="ring-rotation-axis">
                <option value="x">X-axis</option>
                <option value="y">Y-axis</option>
                <option value="z" selected>Z-axis (default)</option>
                <option value="xy">X+Y axes</option>
                <option value="xz">X+Z axes</option>
                <option value="yz">Y+Z axes</option>
            </select>

            <label>Flight Speed: <span id="speed-value" class="value-display">5</span>x</label>
            <input type="range" id="flight-speed" min="0.5" max="10" step="0.1" value="5">

            <label>Autopilot Mode:</label>
            <select id="autopilot-mode">
                <option value="off">Off</option>
                <option value="alpha">Alpha (Path Following)</option>
                <option value="beta" selected>Beta (Longest Path)</option>
            </select>

            <div class="checkbox-container">
                <input type="checkbox" id="enemies-enabled">
                <label for="enemies-enabled">Enable Enemy Planes</label>
            </div>

            <label>Enemy Difficulty: <span id="enemy-diff-value" class="value-display">5</span></label>
            <input type="range" id="enemy-difficulty" min="1" max="10" value="5">

            <div class="checkbox-container">
                <input type="checkbox" id="visual-debugging">
                <label for="visual-debugging">Visual Debugging</label>
            </div>

            <label>Replay Backtrack Distance: <span id="replay-backtrack-value" class="value-display">5</span> units</label>
            <input type="range" id="replay-backtrack" min="1" max="10" step="1" value="5">

            <div class="checkbox-container">
                <input type="checkbox" id="reroll-canyon" checked>
                <label for="reroll-canyon">Re-roll Canyon on Restart</label>
            </div>

            <button id="apply-settings">Apply Settings</button>
        </div>

        <div id="game-over">
            <h2>CRASHED!</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="replay-btn">Replay (Debug)</button>
            <button id="restart-btn">Restart</button>
        </div>

        <div id="instructions">
            <strong>Controls:</strong> W/S - Pitch | A/D - Roll | Space - Shoot | P - Pause
        </div>
    </div>

        import * as THREE from 'three';

        let scene, camera, renderer;

        // Plane dimensions - will be calculated from F22 model

        let betaStraightAheadDistance = 0;  // Track straight-ahead path distance from last sample
        let betaBestDirection = null;  // Track best direction between samples
        let betaBestAngle = 0;  // Track best steering angle (in radians)

        // Position tracking
        let playerZ = 0;
        let lastSegmentZ = 0;

        // Canyon path - stores the center X position at each Z
        const canyonPath = new Map();

        // Noise function for fractal terrain
        class SimplexNoise {
            constructor(seed = Math.random()) {
                this.p = new Uint8Array(256);
                for (let i = 0; i < 256; i++) this.p[i] = i;

                // Shuffle
                let n, q;
                for (let i = 255; i > 0; i--) {
                    n = Math.floor((seed = (seed * 16807) % 2147483647) / 2147483647 * (i + 1));
                    q = this.p[i];
                    this.p[i] = this.p[n];
                    this.p[n] = q;
                }

                this.perm = new Uint8Array(512);
                for (let i = 0; i < 512; i++) this.perm[i] = this.p[i & 255];
            }

            noise2D(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;
                x -= Math.floor(x);
                y -= Math.floor(y);
                const u = this.fade(x);
                const v = this.fade(y);
                const A = this.perm[X] + Y;
                const B = this.perm[X + 1] + Y;
                return this.lerp(v,
                    this.lerp(u, this.grad(this.perm[A], x, y), this.grad(this.perm[B], x - 1, y)),
                    this.lerp(u, this.grad(this.perm[A + 1], x, y - 1), this.grad(this.perm[B + 1], x - 1, y - 1))
                );
            }

            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(t, a, b) { return a + t * (b - a); }
            grad(hash, x, y) {
                const h = hash & 15;
                const u = h < 8 ? x : y;
                const v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
                return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
            }

            // Fractal Brownian Motion for more detailed terrain
            fbm(x, y, octaves = 6, persistence = 0.5, lacunarity = 2.0) {
                let value = 0;
                let amplitude = 1;
                let frequency = 1;
                let maxValue = 0;

                for (let i = 0; i < octaves; i++) {
                    value += amplitude * this.noise2D(x * frequency, y * frequency);
                    maxValue += amplitude;
                    amplitude *= persistence;
                    frequency *= lacunarity;
                }

                return value / maxValue;
            }

            // Ridged multifractal noise: produces sharp crests and creases like
            // wind/water-eroded rock, instead of the rolling waves fbm gives.
            // Returns roughly 0..1.
            ridged(x, y, octaves = 5, persistence = 0.5, lacunarity = 2.0) {
                let value = 0;
                let amplitude = 0.5;
                let frequency = 1;
                let weight = 1;
                let maxValue = 0;

                for (let i = 0; i < octaves; i++) {
                    let n = 1 - Math.abs(this.noise2D(x * frequency, y * frequency));
                    n *= n;              // sharpen the ridges
                    n *= weight;         // higher octaves modulated by lower ones
                    weight = Math.min(1, Math.max(0, n * 2));
                    value += n * amplitude;
                    maxValue += amplitude;
                    amplitude *= persistence;
                    frequency *= lacunarity;
                }

                return value / maxValue;
            }
        }

        let noise = new SimplexNoise(12345);
        let pathNoise = new SimplexNoise(67890);

        // Shared fractal detail generator for canyon walls and floor.
        // Combines domain-warped fbm (natural, non-repeating undulation) with a
        // ridged component (sharp rock striations). More LOD octaves reveal finer,
        // more fractal structure WITHOUT changing the overall canyon shape or the
        // displacement magnitude. Returns roughly -1..1.
        function fractalDetail(x, y, octaves) {
            // Domain warp: perturb the sample point so features look eroded and
            // irregular rather than like a smooth sine surface.
            const wx = x + noise.fbm(x * 0.7 + 31.4, y * 0.7 + 7.2, 2) * 0.75;
            const wy = y + noise.fbm(x * 0.7 + 11.7, y * 0.7 + 53.1, 2) * 0.75;

            // Rolling detail (macro shape preserved by the low octaves).
            const base = noise.fbm(wx, wy, octaves, 0.55, 2.0);

            // Sharp eroded ridges; their fine detail scales with LOD too.
            const ridgeOctaves = Math.max(3, Math.min(octaves, 7));
            const ridge = noise.ridged(wx * 1.7 + 5.0, wy * 1.7 + 9.0, ridgeOctaves);

            // Blend: mostly rolling detail, with ridges carving creases into it.
            return base * 0.7 + (ridge - 0.5) * 0.85;
        }

        // River / water configuration (shared by the floor bed and the water mesh
        // so they always line up).
        const WATER_LEVEL = 2.5;         // world Y of the river surface
        const RIVER_WIDTH_FRAC = 0.16;   // river half-width as fraction of canyon half-width

        // Animated water surface material (created in init, retinted per time of day).
        let waterMaterial = null;
        let waterTime = 0;

        // Get canyon center position at a given Z
        function getCanyonCenter(z) {
            // Create pronounced S-curves with varying radius and angle
            // Primary large S-curves (increased amplitude for sharper curves)
            const curve1 = pathNoise.noise2D(z * 0.0015, 0) * 120;  // Increased from 80
            // Secondary curves for variation in turn radius
            const curve2 = pathNoise.noise2D(z * 0.004, 100) * 60;  // Increased from 40
            // Tertiary detail curves
            const curve3 = pathNoise.noise2D(z * 0.01, 200) * 25;  // Increased from 15
            // Extra variation in turn sharpness
            const curve4 = Math.sin(z * 0.002 + pathNoise.noise2D(z * 0.001, 300) * 2) * 70;  // Increased from 50

            return curve1 + curve2 + curve3 + curve4;
        }

        // Get cross-section shape factor (0 = V-shape, 1 = U-shape)
        function getCrossSectionShape(z) {
            return (pathNoise.noise2D(z * 0.005, 500) + 1) / 2;
        }

        // Get canyon width multiplier (varies between 1x and 2x)
        function getCanyonWidthMultiplier(z) {
            return 1.0 + (pathNoise.noise2D(z * 0.003, 700) + 1) / 2;
        }

        // Get canyon rim height variation (dramatic variation)
        function getCanyonRimHeight(z) {
            // Base height + dramatic variation
            const base = CONFIG.canyonHeight;
            const variation = pathNoise.noise2D(z * 0.004, 900) * 200; // +/- 200 units (2x max height)
            return base + variation;
        }

        // Single source of truth for canyon wall X positions at a given (z, y).
        // BOTH the visual mesh generation and the collision / autopilot logic call
        // this, so the flyable space always exactly matches what is drawn.
        function getWallX(z, y) {
            const centerX = getCanyonCenter(z);
            const crossSection = getCrossSectionShape(z);
            const widthMult = getCanyonWidthMultiplier(z);
            const halfWidth = (CONFIG.canyonWidth / 2) * widthMult;
            const rimHeight = getCanyonRimHeight(z);

            const yFrac = y / rimHeight;

            // Wall angle: V-shape has angled walls, U-shape has more vertical walls.
            const baseAngle = 0.15 + crossSection * 0.6; // 0.15 to 0.75
            const wallAngle = baseAngle + noise.fbm(z * 0.01, y * 0.02, 3) * 0.1;

            // Near the top, walls flare outward so the player can't see the rim edge.
            let topExtension = 0;
            if (yFrac > 0.7) {
                const extendFrac = (yFrac - 0.7) / 0.3;
                topExtension = extendFrac * extendFrac * 60;
            }

            const leftBaseX = centerX - halfWidth + (1 - yFrac) * halfWidth * (1 - wallAngle) - topExtension;
            const rightBaseX = centerX + halfWidth - (1 - yFrac) * halfWidth * (1 - wallAngle) + topExtension;

            // Fractal displacement: LOD octaves add finer, more natural rock detail
            // while the magnitude stays constant so the canyon stays flyable.
            const octaves = Math.max(3, Math.min(CONFIG.lodLevel, 16));
            const dispMag = 12;
            const leftDisp = fractalDetail(z * 0.01, y * 0.05, octaves) * dispMag;
            const rightDisp = fractalDetail(z * 0.01 + 100, y * 0.05, octaves) * dispMag;

            return {
                leftWall: leftBaseX - leftDisp,
                rightWall: rightBaseX + rightDisp,
                canyonCenterX: centerX
            };
        }

        // Backwards-compatible name used by collision + autopilot code.
        function getActualWallPositions(z, y) {
            return getWallX(z, y);
        }

        // Calculate optimal flight path - simply follow canyon center (green line)
        // Returns {x, y} position at given z
        function getOptimalFlightPath(z, currentX = 0) {
            // Simply follow the canyon center
            const centerX = getCanyonCenter(z);

            // Target height: middle of flight envelope for maximum clearance
            const floorHeight = 8; // Safe floor height from collision detection
            const ceilingHeight = CONFIG.canyonHeight - 110; // Safe ceiling
            const targetY = (floorHeight + ceilingHeight) / 2; // Middle altitude

            return { x: centerX, y: targetY };
        }
